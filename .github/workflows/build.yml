name: build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1234
          MYSQL_DATABASE: fiteo_test_database
          MYSQL_USER: root
          MYSQL_PASSWORD: 1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -ppassword --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Create local.properties
        run: |
          cat <<EOF > local.properties
          database.migration=test
          
          database.testEndpoint=jdbc:mysql://127.0.0.1:3306/fiteo_test_database?createDatabaseIfNotExist=TRUE
          database.testUser=admin
          database.testPassword=password
          database.testDatabase=FITEO_TEST_DATABASE
          
          database.endpoint=jdbc:mysql://127.0.0.1:3306/fiteo_database?createDatabaseIfNotExist=TRUE
          database.user=admin
          database.password=password
          database.database=fiteo_database
          firebaseServiceAccount=
            EOF

      - name: Run JVM tests
        run: ./gradlew jvmTest